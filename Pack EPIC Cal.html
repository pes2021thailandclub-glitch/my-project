<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eFootball Box Draw Calculator</title>
    <link rel="stylesheet" href="gemini-code-1784095903949.css">
</head>
<body>
    <div class="container">
        <h1>eFootball Box Draw Calculator</h1>
        
        <div class="card-input">
            <label class="coin-label">
                <img class="coin-icon" src="https://img.konami.com/efootball/s/img/page/efotball-coin.png" alt="Coin icon">
                Coin
            </label>
            <input type="range" id="coinSlider" min="100" max="15000" step="100" value="1000">
            <input type="number" id="coinInput" value="1000">
        </div>

        <div class="result">
            <h2 id="drawCount">10 ครั้ง</h2>
            <div class="probability">
                <div>โอกาสได้ EPIC: <span id="epicChance">18.81%</span></div>
                <div>โอกาสได้ Highlight อย่างน้อย 1 ใบ: <span id="hlChance">43.21%</span></div>
            </div>
        </div>

        <!-- ส่วนแสดงผลการ์ดจำลอง -->
        <div class="card-display-container">
            <h3>การ์ดเป้าหมายในตู้ (11 ช่อง)</h3>
            
            <!-- กลุ่มการ์ดตำนาน 3 ใบ -->
            <div class="card-group epic-group">
                <h4>Epic / Legend (3 ใบ)</h4>
                <div class="cards-grid" id="epicCardsGrid">
                    <!-- การ์ดจะถูกสร้างด้วย JavaScript -->
                </div>
            </div>

            <!-- กลุ่มการ์ด Highlight 8 ใบ -->
            <div class="card-group highlight-group">
                <h4>Highlight (8 ใบ)</h4>
                <div class="cards-grid" id="highlightCardsGrid">
                    <!-- การ์ดจะถูกสร้างด้วย JavaScript -->
                </div>
            </div>
        </div>

        <div class="feature-section">
            <div class="panel-card">
                <h3>Dashboard สรุปผล</h3>
                <div class="dashboard-grid" id="dashboardSummary"></div>
            </div>

            <div class="panel-card">
                <h3>Compare Mode</h3>
                <p class="panel-caption">ดูผลลัพธ์สำหรับโคอิ่นยอดนิยมแบบเปรียบเทียบกัน</p>
                <div class="compare-grid" id="compareGrid"></div>
            </div>

            <div class="panel-card">
                <h3>Simulation Mode</h3>
                <div class="simulation-controls">
                    <label for="simulationCount">จำนวนรอบจำลอง</label>
                    <input type="number" id="simulationCount" min="100" max="10000" step="100" value="1000">
                    <button type="button" id="runSimulationBtn">จำลองตอนนี้</button>
                </div>
                <div class="simulation-results" id="simulationResults"></div>
            </div>
        </div>
    </div>

    <script src="gemini-code-1784095849559.js"></script>
    <script src="gemini-code-1784095901070.js"></script>
</body>
</html>
